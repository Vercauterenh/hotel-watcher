name: Check Hotel Availability

on:
  schedule:
    - cron: "0,30 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}

      - name: Install dependencies
        run: |
          pip install playwright
          python -m playwright install --with-deps chromium

      - name: Run hotel check (single pass)
        env:
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          TO_EMAIL: ${{ secrets.TO_EMAIL }}
          NOTIFY_METHOD: email
          HEADLESS: "true"
        run: python hotel_watcher.py --once

      - name: Commit updated state
        run: |
          git config user.name "hotel-watcher-bot"
          git config user.email "actions@users.noreply.github.com"
          git add hotel_watcher_state.txt
          git diff --cached --quiet || git commit -m "update hotel availability state"
          git push
